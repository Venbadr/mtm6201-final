<!doctype html>
<!-- adding schema -->
<html lang="en" itemscope itemtype="https://schema.org/NGO">
  <head>
    <!-- adding css library -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- adding Bebas Neue and Inter  -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Contact</title>
    <!-- bootstrap css -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- custom css -->
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <!-- adding skip link -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header>
      <!-- logo -->

      <img
        class="img-fluid pt-2 pb-2"
        src="images/logo.jpeg"
        alt="logo"
        id="logo"
      />

      <!-- layout for the image and the navs -->

      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-6">
            <picture>
              <!-- pc layout for the contacts image using srcset -->
              <source
                media="(min-width:1100px)"
                srcset="images/contactdesk.jpeg"
              />
              <!-- tablet layout for the contact image using srcset  -->
              <source media="(min-width:768px)" srcset="images/contactab.jpeg" />

              <!-- mobile layout for contact image  -->
              <!-- adding animation using animate css library -->
              <img
                src="images/contactmob.jpeg"
                alt="dog banner"
                id="cont"
                class="ps-2 animate__animated animate__fadeInDown"
              />
            </picture>
          </div>

          <div class="test col-6">
            <!-- adding aria label -->
            <nav aria-label="Main navigation" class="d-flex flex-column">
              <div class="text-center mb-3">
                <a href="index.html" class="dog1 display-6 px-3">VOLUNTEER</a>
              </div>

              <div class="text-center mb-3">
                <a href="about.html" class="dog1 display-6 px-4">ABOUT US</a>
              </div>

              <div class="text-center mb-3">
                <a href="testimonials.html" class="dog1 display-6 px-2"
                  >TESTIMONIALS</a
                >
              </div>

              <div class="text-center mb-3">
                <a href="schedule.html" class="dog1 display-6 px-4">SCHEDULE</a>
              </div>

              <div class="text-center mb-3">
                <a href="contact.html" class="dog1 display-6 px-3"
                  >CONTACT US</a
                >
              </div>
            </nav>
          </div>
        </div>
      </div>
    </header>
    <!-- adding skip link to main -->
    <main id="main-content">
      <!-- styling h2 using bootstrap -->

     

      <h2 class="contact display-2 text-center pt-4">
        HAVE QUESTIONS? CONTACT US ANYTIME
      </h2>

      <div class="container">
        <div class="row">
            <div class="col-12 col-lg-6 order-1 order-lg-2">
        <form>
          <div class="mb-3 me-5">
            <label for="name" class="visually-hidden">Name</label>
            <input
              type="text"
              class="form-control rounded-0 ms-4"
              id="name"
              placeholder="NAME"
            />
          </div>

          <div class="mb-3 me-5">
            <label for="email" class="visually-hidden">EMAIL</label>
            <input
              type="email"
              class="form-control rounded-0 ms-4"
              id="email"
              placeholder="EMAIL"
            />
          </div>

          <div class="mb-3 me-5">
            <label for="message" class="visually-hidden">Message</label>
            <textarea
              class="form-control rounded-0 ms-4"
              id="message"
              rows="4"
              placeholder="MESSAGE"
            ></textarea>
          </div>

          <!-- Button customization using bootstrap -->
          <div class="text-center">
            <button
              type="submit"
              class="btn btn-primary fw-bold rounded-0 pe-4 ps-4"
            >
              SUBMIT
            </button>
          </div>
        </form>
      </div>
      <div class="col-12 col-lg-6 order-2 order-lg-1">
      <div class="ms-4 mt-4 me-4 mb-5">
        <!-- adding the map -->
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d44858.3503152879!2d-75.76731714523063!3d45.35593971560359!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1sCanada%20Post!5e0!3m2!1sen!2sca!4v1775955575815!5m2!1sen!2sca"
          width="500"
          height="200"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </div>
      </div>
        </div>
      </div>
    </main>

    <hr class="mt-2" />

    <footer>
      <img src="images/social.jpg" alt="social media" id="social" />
      © Pawsitive futures 2026
    </footer>
  </body>
</html>
